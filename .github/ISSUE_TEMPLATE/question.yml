name: "❓ Question / 问题咨询"
description: Usage questions, configuration issues, or feedback you're not sure is a bug. / 使用疑问、配置问题或不确定是否为 bug 的反馈。
title: "[Question] "
labels: ["question"]
body:
  - type: input
    id: database
    attributes:
      label: 数据库类型和版本
      description: 如果问题与数据库无关，请填写“无关”。否则请注明数据库类型、版本或发行版。
      placeholder: "例如：PostgreSQL 16.2 / MySQL 8.0 / Redis 7.2 / 无关"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: DBX 版本
      placeholder: "例如：v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      multiple: true
      options:
        - macOS
        - Windows
        - Linux
        - 其他
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 描述
      description: 你想完成什么？已经尝试了什么？
      placeholder: "例如：我想通过 SSH 隧道连接内网 PostgreSQL，已确认本机 psql 可以连接，但 DBX 中测试连接提示..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 环境信息
      description: 连接方式、特殊环境、已尝试的排查方式等。
      placeholder: |
        连接方式：
        补充环境：
